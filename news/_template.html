<!--
  ============================================================
  NEWS記事テンプレート（このファイルは公開ページではありません）
  ============================================================
  新しい記事を追加する手順：

  1. このファイルをコピーして、news/ フォルダの中に
     「日付-内容が分かる英数字.html」という名前で保存する
     例）2026-08-01-new-event.html

  2. ファイル内の【】で囲まれた部分をすべて書き換える
     - 【記事タイトル】       … 見出しになる文章
     - 【日付】               … 2026.08.01 のような表示用の日付（期間の場合は「2026.08.01 - 2026.08.03」のように）
     - 【日付-ハイフン形式】  … 2026-08-01 のような公開日（メタ情報用）
     - 【タグ】               … Model / Live / Event / Media / Other のいずれか
                                 （style.cssの .tag-model など、対応するclass名も変更）
     - 【本文】               … お知らせの本文（pタグで段落を分ける）。ブログ調・日記調にはせず、
                                 ニュースリリースのように簡潔で客観的な文章にする
     - og:image               … assets/images/news/ に用意した画像があれば差し替える（SNSシェア時のみに使用。
                                 記事ページ本文には画像を表示しません）

  3. 外部サイト（FANMEなど）へのリンクがある記事は、本文の最後に【CTAボタン】の
     ブロック（コメントアウトを外して使う）でリンクを設置する。リンクが無い記事は
     このブロックごと削除してよい。

  4. できあがったら、以下の2箇所にもこの記事へのリンクを追加する
     - index.html のHero内NEWS（横スクロールのカルーセル。件数が多い場合は古いものを間引いてOK）
     - news.html   のNEWS一覧（一番上に追加、data-category="model"のようにカテゴリを指定。
       CTAリンクがある記事のみ .news-link-indicator（外部リンクアイコン）も付ける）

  5. 最後にFTP（FileZilla）でファイルをアップロードすれば公開完了です。

  ※ タグの色は css/style.css の「タグ（カテゴリ）カラー」の項目で
    一括管理されているので、ここでは触る必要はありません。
  ============================================================
-->
